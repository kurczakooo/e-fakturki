repos:
  - repo: local
    hooks:
      # ---------- BACKEND ----------
      - id: ruff-format-backend
        name: Ruff format (backend)
        entry: bash -c "uv run ruff format --force-exclude \"$@\""
        language: system
        files: ^apps/backend/

      - id: ruff-backend
        name: Ruff check (backend)
        entry: bash -c "uv run ruff check --force-exclude \"$@\""
        language: system
        files: ^apps/backend/

      - id: mypy-backend
        name: MyPy validate types (backend)
        entry: bash -c "uv run mypy --follow-imports=skip \"$@\""
        language: system
        files: ^apps/backend/

      # ---------- FRONTEND ----------
      - id: prettier-frontend
        name: Prettier (frontend)
        entry: bash -c "cd apps/frontend && npm run format --  \"$@\""
        language: system
        files: ^apps/frontend/

      - id: eslint-frontend
        name: ESLint (frontend)
        entry: bash -c "cd apps/frontend && npm run lint --  \"$@\""
        language: system
        files: ^apps/frontend/
