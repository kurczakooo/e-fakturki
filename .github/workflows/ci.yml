name: CI

on:
  push:
    branches: [main, feature/*, hotfix/*, refactor/*]

jobs:
  backend:
    name: Backend checks (ruff + mypy)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Install uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: MyPy (full check)
        run: uv run mypy .

  frontend:
    name: Frontend checks (eslint + prettier)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format -- --check
